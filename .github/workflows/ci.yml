name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: permissions_integration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore
        env:
          NUGET_GITHUB_TOKEN: ${{ secrets.NUGET_GITHUB_TOKEN }}

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        env:
          INTEGRATION_TEST_CONNECTION_STRING: "Host=localhost;Port=5432;Database=permissions_integration_test;Username=postgres;Password=postgres"
        run: dotnet test --no-build --configuration Release --verbosity normal
